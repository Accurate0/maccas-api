name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-other:
    strategy:
      fail-fast: false
      matrix:
        apps: [web, clustering]

    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@main
    with:
      directory: ${{ matrix.apps }}
      image-name: maccas-${{ matrix.apps }}
      docker-build-args: |
        BINARY_NAME=${{ matrix.apps }}
      use-rust-caching: false

  build-rust:
    strategy:
      fail-fast: false
      matrix:
        apps: [api, scheduler, migration, recommendations]

    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@main
    with:
      directory: .
      image-name: maccas-${{ matrix.apps }}
      docker-build-args: |
        BINARY_NAME=${{ matrix.apps }}
      use-rust-caching: true

  deploy:
    needs:
      - build-other
      - build-rust
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@main
    with:
      service-name: maccas-api
      images: ghcr.io/accurate0/maccas-api,ghcr.io/accurate0/maccas-scheduler,ghcr.io/accurate0/maccas-recommendations,ghcr.io/accurate0/maccas-migration,ghcr.io/accurate0/maccas-clustering,ghcr.io/accurate0/maccas-web,ghcr.io/accurate0/maccas-sensordata
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}

  annotate:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Add annotation
        uses: axiomhq/annotation-action@v0.1.0
        with:
          axiomToken: ${{ secrets.AXIOM_API_TOKEN }}
          datasets: ${{ secrets.AXIOM_DATASET_NAME }}
          type: "production-release"
          title: "Production deployment"
          description: "Commit ${{ github.event.head_commit.message }}"
