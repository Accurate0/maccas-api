name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-other:
    strategy:
      fail-fast: false
      matrix:
        apps: [web, clustering]

    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.apps }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.apps }}-

      - name: Docker build
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ matrix.apps }}
          push: true
          tags: ghcr.io/accurate0/maccas-${{ matrix.apps }}:latest,ghcr.io/accurate0/maccas-${{ matrix.apps }}:${{ github.sha }}
          build-args: |
            BINARY_NAME=${{ matrix.apps }}
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  build-rust:
    strategy:
      fail-fast: false
      matrix:
        apps: [api, scheduler, migration, recommendations]

    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@main
    with:
      directory: .
      image-name: maccas-${{ matrix.apps }}
      docker-build-args: |
        BINARY_NAME=${{ matrix.apps }}
      use-rust-caching: true

  deploy:
    needs:
      - build-other
      - build-rust
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@main
    with:
      service-name: maccas-api
      images: ghcr.io/accurate0/maccas-api,ghcr.io/accurate0/maccas-scheduler,ghcr.io/accurate0/maccas-recommendations,ghcr.io/accurate0/maccas-migration,ghcr.io/accurate0/maccas-clustering,ghcr.io/accurate0/maccas-web,ghcr.io/accurate0/maccas-sensordata
      manifests-path: projects/maccas-api/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}

  annotate:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Add annotation
        uses: axiomhq/annotation-action@v0.1.0
        with:
          axiomToken: ${{ secrets.AXIOM_API_TOKEN }}
          datasets: ${{ secrets.AXIOM_DATASET_NAME }}
          type: "production-release"
          title: "Production deployment"
          description: "Commit ${{ github.event.head_commit.message }}"
